<!DOCTYPE html>
<!-- 这个是主页封面 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jie Wu</title>
  <link rel="icon" href="/images/fav.ico" type="image/x-icon">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('/images/home.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
    }
    h1 {
      font-size: 70px;
      margin-bottom: -20px;
      color: #fff;
    }
    h2 {
      font-size: 24px;
      margin-bottom: 50px;
      color: #fff;
    }
    ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }
    li {
      margin: 12px 0;
    }
    a {
      text-decoration: none;
      color: #fff;
      font-size: 19px;
      display: inline-block;
      padding: 13px 24px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.10));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.35),
        inset 0 -1px 0 rgba(255, 255, 255, 0.08),
        0 10px 28px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(10px) saturate(140%);
      -webkit-backdrop-filter: blur(10px) saturate(140%);
      transition: background-color 0.22s ease, border-color 0.22s ease, transform 0.22s ease, box-shadow 0.22s ease, opacity 0.22s ease;
    }
    a:hover {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.30), rgba(255, 255, 255, 0.14));
      border-color: rgba(255, 255, 255, 0.18);
      transform: translateY(-1px) scale(1.01);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.42),
        inset 0 -1px 0 rgba(255, 255, 255, 0.10),
        0 14px 34px rgba(0, 0, 0, 0.22);
    }
    a:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.95);
      outline-offset: 3px;
    }
    hr {
      width: 60%;
      border: none;
      height: 1.5px;
      background-color: #fff;
      margin: 20px auto;
    }
    .footer-text {
      margin-top: 40px;
      font-size: 15px;
      text-align: center;
    }
    .footer-text a {
      color: #fff;
      text-decoration: none;
      border: none;
      font-size: inherit;
      margin: 0;
      padding: 0;
      display: inline;
      background: none;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      transition: none;
      transform: none;
    }
    .footer-text a:hover {
      background: none;
      border-color: transparent;
      box-shadow: none;
      transform: none;
    }
    .footer-text a:focus-visible {
      outline: 1px solid rgba(255, 255, 255, 0.95);
      outline-offset: 2px;
    }
    .waveform-image {
      width: 50%;
      margin-bottom: -10px;
    }
  </style>
</head>
<body>
  <img src="/images/waveform.png" alt="Waveform Image" class="waveform-image">
  <hr>
  <div style="text-align: center;">
    <h1>Welcome!</h1>
    <h2>Jie Wu's personal website</h2>
    <ul>
      <li><a href="/about">About</a></li>
      <li><a href="/publications">Publications</a></li>
      <li><a href="/awards">Honors & Activities</a></li>
      <li><a href="/file/CV/cv.pdf">CV</a></li>
    </ul>
    <br>
  </div>
  <hr>
  <div class="footer-text">
    &copy; 2024-{{ site.time | date: '%Y' }} {{ site.owner.name }}.
    <a href="https://pages.github.com/" target="_blank">Published with GitHub Pages.</a>
    <a href="https://www.ligo.caltech.edu/image/ligo20170601a" target="_blank">Image source: LIGO Laboratory.</a>
  </div>
</body>
</html>
